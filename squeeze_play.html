<style>
    .sp-wrapper {
        /* Scoped variables */
        --sp-bg-card: linear-gradient(145deg, #1f1f1f, #121212);
        --sp-text-main: #f8fafc;
        --sp-text-muted: #94a3b8;
        --sp-accent-gold: #d4af37;
        --sp-accent-gold-light: #f3e5ab;
        --sp-accent-glow: rgba(212, 175, 55, 0.4);

        font-family: 'Outfit', sans-serif, system-ui;
        display: block;
        text-align: center;
        padding: 1.5rem 0;
        width: 100%;
        box-sizing: border-box;
        clear: both;
        /* Prevents overlapping with floated elements like "Rule of the Day" */
        overflow: hidden;
        margin-bottom: 1.5rem;
    }

    .sp-container {
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        /* Centers the card */
        position: relative;
    }

    .sp-card {
        background: var(--sp-bg-card);
        border-radius: 24px;
        padding: 2.5rem 1rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        transition: box-shadow 0.4s ease;
        width: 100%;
        box-sizing: border-box;
    }

    .sp-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, transparent, var(--sp-accent-gold), transparent);
        background-size: 200% 100%;
        animation: sp-shimmer 3s infinite linear;
    }

    .sp-card:hover {
        box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.9), 0 0 20px var(--sp-accent-glow);
    }

    .sp-content {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
    }

    #sp-widget-wrapper .sp-title {
        font-size: 2.25rem;
        font-weight: 700;
        margin: 0;
        background: linear-gradient(135deg, var(--sp-accent-gold-light) 0%, var(--sp-accent-gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        /* Support for browsers without background-clip: text */
        color: var(--sp-accent-gold) !important;
        text-shadow: 0 2px 10px rgba(212, 175, 55, 0.2);
        line-height: 1.2;
    }

    #sp-widget-wrapper .sp-subtitle {
        font-size: 1.2rem;
        font-weight: 400;
        color: var(--sp-text-muted) !important;
        margin: 0;
        letter-spacing: 0.02em;
    }

    #sp-widget-wrapper .sp-action-wrapper {
        margin-top: 1.5rem;
        text-decoration: none !important;
        display: inline-block;
    }

    #sp-widget-wrapper .sp-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        font-size: 1rem;
        font-weight: 800 !important;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #121212 !important;
        /* Pure Black text */
        background: linear-gradient(135deg, #f3e5ab, #d4af37) !important;
        /* Premium Gold Gradient */
        padding: 1rem 2.5rem;
        border-radius: 50px;
        box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3) !important;
        transition: all 0.3s ease;
        border: none !important;
        cursor: pointer;
    }

    #sp-widget-wrapper .sp-action-wrapper:hover .sp-action,
    #sp-widget-wrapper .sp-action-wrapper:active .sp-action {
        box-shadow: 0 15px 25px rgba(212, 175, 55, 0.5) !important;
        background: linear-gradient(135deg, #fef08a, #eab308) !important;
    }

    #sp-widget-wrapper .sp-action svg {
        width: 20px;
        height: 20px;
    }

    @keyframes sp-shimmer {
        0% {
            background-position: 200% 0;
        }

        100% {
            background-position: -200% 0;
        }
    }

    @media (max-width: 640px) {
        .sp-card {
            padding: 1.5rem 1rem;
        }

        .sp-title {
            font-size: 1.75rem;
        }

        .sp-subtitle {
            font-size: 1rem;
        }

        .sp-action {
            font-size: 0.9rem;
            padding: 0.8rem 2rem;
        }
    }
</style>

<div class="sp-wrapper" id="sp-widget-wrapper">
    <!-- Make sure the Google Font is loaded inside the widget itself if it isn't in the `<head>` of your site -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">

    <div class="sp-container">
        <!-- Changed from an <a> tag to a regular <div> to prevent Bridgewebs link bleed -->
        <div class="sp-card">
            <div class="sp-content">
                <h2 class="sp-title" style="color: #d4af37 !important;">Do you know what “Squeeze Play” is?</h2>
                <p class="sp-subtitle" style="color: #94a3b8 !important;">Use your Acol Pool password and click here</p>

                <!-- The link is now wrapped carefully around an inner DIV block to protect against mobile CMS overrides -->
                <a href="https://squeeze-trainer.web.app" class="sp-action-wrapper" id="sp-action-btn"
                    title="Click to enter Squeeze Trainer" style="text-decoration: none !important;">
                    <div class="sp-action" style="background: linear-gradient(135deg, #f3e5ab, #d4af37) !important;">
                        <span style="color: #121212 !important; font-weight: 800 !important;">Play Now</span>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2" style="color: #121212 !important; stroke: #121212 !important;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
